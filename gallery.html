<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e293b">
  <title>갤러리</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-user-select: none; -moz-user-select: none; user-select: none;
      -webkit-touch-callout: none;
    }

    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --blue: #4f8ef7;
      --blue-dark: #2563eb;
      --muted: #94a3b8;
      --border: #334155;
    }

    body {
      background: var(--bg);
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── 헤더 ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15,23,42,0.95);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .header-top h1 { font-size: 1.1rem; font-weight: 700; }
    .badge {
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--card);
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    /* ── 폴더 드롭다운 ── */
    .folder-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding-bottom: 2px;
    }
    .folder-bar::-webkit-scrollbar { display: none; }

    .folder-select-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .folder-select-wrap::after {
      content: '▾';
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--muted);
      font-size: 0.75rem;
    }
    select#folderSelect {
      appearance: none;
      -webkit-appearance: none;
      background: var(--card);
      border: 1px solid var(--border);
      color: #f1f5f9;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 7px 28px 7px 12px;
      border-radius: 10px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
      max-width: 220px;
    }
    select#folderSelect:focus { border-color: var(--blue); }

    /* 폴더 칩 (보조 — 빠른 이동용) */
    .folder-chips {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .chip {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.78rem;
      padding: 5px 12px;
      border-radius: 999px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .chip.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    /* ── 그리드 ── */
    .gallery {
      padding: 14px;
      columns: 2;
      column-gap: 10px;
    }
    @media (min-width: 600px)  { .gallery { columns: 3; } }
    @media (min-width: 900px)  { .gallery { columns: 4; } }
    @media (min-width: 1200px) { .gallery { columns: 5; } }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 10px;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
    }
    .gallery-item img {
      display: block;
      width: 100%;
      height: auto;
      transition: transform 0.3s ease;
      -webkit-user-drag: none;
      pointer-events: none;
    }
    .gallery-item:hover img { transform: scale(1.04); }
    .gallery-item::after { content: ''; position: absolute; inset: 0; }

    .video-badge {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 0.7rem;
      padding: 3px 7px;
      border-radius: 6px;
      pointer-events: none;
    }

    /* ── 로딩 / 빈 상태 ── */
    .state-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      gap: 14px;
      color: var(--muted);
    }
    .spinner {
      width: 38px; height: 38px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 라이트박스 ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.94);
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    #lightbox.open { display: flex; }

    #lb-media {
      max-width: 92vw;
      max-height: 82vh;
      object-fit: contain;
      border-radius: 8px;
      pointer-events: none;
      -webkit-user-drag: none;
    }
    #lb-video {
      max-width: 92vw;
      max-height: 82vh;
      border-radius: 8px;
      outline: none;
      pointer-events: auto;
      display: none;
    }
    #lb-caption {
      margin-top: 12px;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      padding: 0 60px;
    }
    #lb-close {
      position: absolute;
      top: 14px; right: 14px;
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      font-size: 1.3rem;
      width: 42px; height: 42px;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    #lb-close:hover { background: rgba(255,255,255,0.22); }

    .lb-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      font-size: 1.5rem;
      width: 44px; height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .lb-nav:hover { background: rgba(255,255,255,0.22); }
    #lb-prev { left: 10px; }
    #lb-next { right: 10px; }

    #watermark {
      position: fixed;
      bottom: 16px; right: 16px;
      font-size: 0.68rem;
      color: rgba(255,255,255,0.15);
      pointer-events: none;
      z-index: 1001;
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>📸 갤러리</h1>
    <span class="badge" id="countBadge">불러오는 중…</span>
  </div>

  <div class="folder-bar">
    <!-- 드롭다운 -->
    <div class="folder-select-wrap">
      <select id="folderSelect">
        <option value="root">📁 전체 (루트)</option>
      </select>
    </div>
    <!-- 칩 (로드 후 채워짐) -->
    <div class="folder-chips" id="folderChips"></div>
  </div>
</header>

<div id="gallery" class="gallery"></div>
<div id="stateBox"></div>

<!-- 라이트박스 -->
<div id="lightbox">
  <button id="lb-close">✕</button>
  <button class="lb-nav" id="lb-prev">‹</button>
  <img id="lb-media" src="" alt="">
  <video id="lb-video" controls controlsList="nodownload" disablePictureInPicture></video>
  <button class="lb-nav" id="lb-next">›</button>
  <div id="lb-caption"></div>
</div>

<div id="watermark">무단 복제 금지</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz0cBl-OPXkeoxSs80Bv2_zqAf-B98yrzZ6AuD966FNVjDx0WOy-DgzMip9pFBe84c/exec';
  const ROOT_ID    = 'root'; // 루트 폴더를 나타내는 내부 키

  // ── 복사 방지 ──
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('dragstart',   e => e.preventDefault());
  document.addEventListener('selectstart', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    const ctrl = e.ctrlKey || e.metaKey;
    if (ctrl && ['s','u','a','c','p'].includes(e.key.toLowerCase())) e.preventDefault();
    if (e.key === 'PrintScreen') e.preventDefault();
  });

  // ── 상태 ──
  let files       = [];
  let folders     = [];
  let currentIdx  = 0;
  let currentFolder = ROOT_ID; // 현재 선택된 폴더

  // ── DOM ──
  const gallery      = document.getElementById('gallery');
  const stateBox     = document.getElementById('stateBox');
  const countBadge   = document.getElementById('countBadge');
  const folderSelect = document.getElementById('folderSelect');
  const folderChips  = document.getElementById('folderChips');
  const lightbox     = document.getElementById('lightbox');
  const lbMedia      = document.getElementById('lb-media');
  const lbVideo      = document.getElementById('lb-video');
  const lbCaption    = document.getElementById('lb-caption');

  // ── 초기화 ──
  async function init() {
    await loadFolders();
    await loadFiles(ROOT_ID);
  }

  // ── 폴더 목록 불러오기 ──
  async function loadFolders() {
    try {
      const res  = await fetch(SCRIPT_URL + '?action=folders');
      const data = await res.json();
      if (data.status !== 'success' || !data.folders.length) return;

      folders = data.folders;

      // 드롭다운 옵션 추가
      folders.forEach(f => {
        const opt = document.createElement('option');
        opt.value = f.id;
        opt.textContent = '📂 ' + f.name;
        folderSelect.appendChild(opt);
      });

      // 칩 추가 (전체 + 각 폴더)
      renderChips(ROOT_ID);
    } catch (_) {}
  }

  function renderChips(activeFolderId) {
    folderChips.innerHTML = '';

    const allChip = makeChip('📁 전체', ROOT_ID, activeFolderId);
    folderChips.appendChild(allChip);

    folders.forEach(f => {
      folderChips.appendChild(makeChip('📂 ' + f.name, f.id, activeFolderId));
    });
  }

  function makeChip(label, folderId, activeFolderId) {
    const chip = document.createElement('button');
    chip.className = 'chip' + (folderId === activeFolderId ? ' active' : '');
    chip.textContent = label;
    chip.addEventListener('click', () => switchFolder(folderId));
    return chip;
  }

  // ── 파일 목록 불러오기 ──
  async function loadFiles(folderId) {
    currentFolder = folderId;
    gallery.innerHTML = '';
    stateBox.innerHTML = '<div class="state-center"><div class="spinner"></div><span>사진 불러오는 중…</span></div>';
    countBadge.textContent = '불러오는 중…';

    try {
      const url = folderId === ROOT_ID
        ? SCRIPT_URL + '?action=list'
        : SCRIPT_URL + '?action=list&folderId=' + folderId;

      const res  = await fetch(url);
      const data = await res.json();
      if (data.status !== 'success') throw new Error(data.message);

      files = data.files;
      stateBox.innerHTML = '';

      if (files.length === 0) {
        stateBox.innerHTML = '<div class="state-center"><span style="font-size:2rem">📭</span><span>이 폴더에 사진이 없습니다.</span></div>';
        countBadge.textContent = '0장';
        return;
      }

      countBadge.textContent = files.length + '장';
      files.forEach((f, i) => renderItem(f, i));

    } catch (err) {
      stateBox.innerHTML = `<div class="state-center"><span style="font-size:2rem">⚠️</span><span>불러오기 실패: ${err.message}</span></div>`;
      countBadge.textContent = '오류';
    }
  }

  function switchFolder(folderId) {
    // 드롭다운 동기화
    folderSelect.value = folderId;
    // 칩 동기화
    renderChips(folderId);
    loadFiles(folderId);
  }

  // 드롭다운 변경 → 폴더 전환
  folderSelect.addEventListener('change', () => {
    renderChips(folderSelect.value);
    loadFiles(folderSelect.value);
  });

  // ── 아이템 렌더 ──
  function renderItem(f, i) {
    const isVideo = f.mimeType.startsWith('video/');
    const div = document.createElement('div');
    div.className = 'gallery-item';

    div.innerHTML = `
      <img src="https://drive.google.com/thumbnail?id=${f.id}&sz=w600"
           alt="${esc(f.name)}" loading="lazy"
           onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1 1%22><rect fill=%22%231e293b%22 width=%221%22 height=%221%22/></svg>'">
      ${isVideo ? '<span class="video-badge">🎥 동영상</span>' : ''}
    `;
    div.addEventListener('click', () => openLightbox(i));
    gallery.appendChild(div);
  }

  // ── 라이트박스 ──
  function openLightbox(idx) {
    currentIdx = idx;
    showSlide();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    lbVideo.pause();
    lbVideo.src = '';
    lbMedia.src = '';
    document.body.style.overflow = '';
  }

  function showSlide() {
    const f = files[currentIdx];
    const isVideo = f.mimeType.startsWith('video/');
    lbCaption.textContent = f.name;
    if (isVideo) {
      lbMedia.style.display = 'none';
      lbVideo.style.display = 'block';
      lbVideo.src = `https://drive.google.com/file/d/${f.id}/preview`;
    } else {
      lbVideo.style.display = 'none';
      lbVideo.pause();
      lbMedia.style.display = 'block';
      lbMedia.src = `https://drive.google.com/uc?export=view&id=${f.id}`;
    }
  }

  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', () => {
    currentIdx = (currentIdx - 1 + files.length) % files.length;
    showSlide();
  });
  document.getElementById('lb-next').addEventListener('click', () => {
    currentIdx = (currentIdx + 1) % files.length;
    showSlide();
  });
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'ArrowLeft')  { currentIdx = (currentIdx - 1 + files.length) % files.length; showSlide(); }
    if (e.key === 'ArrowRight') { currentIdx = (currentIdx + 1) % files.length; showSlide(); }
    if (e.key === 'Escape')     closeLightbox();
  });

  let touchX = 0;
  lightbox.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
  lightbox.addEventListener('touchend', e => {
    const diff = touchX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) {
      currentIdx = diff > 0
        ? (currentIdx + 1) % files.length
        : (currentIdx - 1 + files.length) % files.length;
      showSlide();
    }
  });

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init();
</script>
</body>
</html>
