<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e293b">
  <title>갤러리</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-user-select: none; -moz-user-select: none; user-select: none;
      -webkit-touch-callout: none;
    }
    :root {
      --bg: #0f172a; --card: #1e293b; --blue: #4f8ef7;
      --muted: #94a3b8; --border: #334155;
    }
    body {
      background: var(--bg); color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── 헤더 ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,23,42,0.95);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .header-top h1 { font-size: 1.1rem; font-weight: 700; }
    .badge {
      font-size: 0.75rem; color: var(--muted);
      background: var(--card); padding: 4px 10px;
      border-radius: 999px; border: 1px solid var(--border); white-space: nowrap;
    }

    /* ── 폴더 바 ── */
    .folder-bar {
      display: flex; align-items: center; gap: 8px;
      overflow-x: auto; scrollbar-width: none;
    }
    .folder-bar::-webkit-scrollbar { display: none; }
    .folder-select-wrap { position: relative; flex-shrink: 0; }
    .folder-select-wrap::after {
      content: '▾'; position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%); pointer-events: none;
      color: var(--muted); font-size: 0.75rem;
    }
    select#folderSelect {
      appearance: none; -webkit-appearance: none;
      background: var(--card); border: 1px solid var(--border);
      color: #f1f5f9; font-size: 0.85rem; font-weight: 600;
      padding: 7px 28px 7px 12px; border-radius: 10px;
      cursor: pointer; outline: none; max-width: 220px;
      transition: border-color 0.2s;
    }
    select#folderSelect:focus { border-color: var(--blue); }
    .folder-chips { display: flex; gap: 6px; flex-shrink: 0; }
    .chip {
      background: var(--card); border: 1px solid var(--border);
      color: var(--muted); font-size: 0.78rem;
      padding: 5px 12px; border-radius: 999px;
      cursor: pointer; white-space: nowrap;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .chip.active { background: var(--blue); border-color: var(--blue); color: #fff; }

    /* ── 그리드 (고정 비율 셀) ── */
    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px; padding: 12px;
    }
    @media (min-width: 540px)  { .gallery { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 800px)  { .gallery { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 1100px) { .gallery { grid-template-columns: repeat(5, 1fr); } }

    /* 스켈레톤 + 이미지 셀 */
    .gallery-item {
      aspect-ratio: 1;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
    }
    /* 로딩 전 스켈레톤 shimmer */
    .gallery-item.skeleton {
      background: linear-gradient(90deg, #1e293b 25%, #263548 50%, #1e293b 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    .gallery-item img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease, opacity 0.3s ease;
      -webkit-user-drag: none;
      pointer-events: none;
      opacity: 0;
    }
    .gallery-item img.loaded { opacity: 1; }
    .gallery-item:hover img { transform: scale(1.06); }
    /* 복사 방지 투명 오버레이 */
    .gallery-item::after { content: ''; position: absolute; inset: 0; }
    .video-badge {
      position: absolute; top: 7px; right: 7px;
      background: rgba(0,0,0,0.65); color: #fff;
      font-size: 0.68rem; padding: 3px 7px;
      border-radius: 6px; pointer-events: none; z-index: 1;
    }

    /* ── 상태 ── */
    .state-center {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 50vh; gap: 14px; color: var(--muted);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 라이트박스 ── */
    #lightbox {
      display: none; position: fixed; inset: 0;
      z-index: 1000; background: rgba(0,0,0,0.94);
      align-items: center; justify-content: center; flex-direction: column;
    }
    #lightbox.open { display: flex; }

    .lb-img-wrap {
      position: relative;
      max-width: 92vw; max-height: 82vh;
      display: flex; align-items: center; justify-content: center;
    }
    /* 저해상도 (즉시 표시) */
    #lb-thumb {
      max-width: 92vw; max-height: 82vh;
      object-fit: contain; border-radius: 8px;
      pointer-events: none; -webkit-user-drag: none;
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      filter: blur(0px);
      transition: opacity 0.25s;
    }
    /* 고해상도 (로드 완료 후 fade-in) */
    #lb-hires {
      max-width: 92vw; max-height: 82vh;
      object-fit: contain; border-radius: 8px;
      pointer-events: none; -webkit-user-drag: none;
      opacity: 0; transition: opacity 0.3s ease;
      position: relative; z-index: 1;
    }
    #lb-hires.ready { opacity: 1; }

    #lb-video {
      max-width: 92vw; max-height: 82vh;
      border-radius: 8px; outline: none;
      pointer-events: auto; display: none;
    }
    #lb-spinner {
      position: absolute; z-index: 2;
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    #lb-caption {
      margin-top: 12px; font-size: 0.8rem;
      color: var(--muted); text-align: center; padding: 0 60px;
    }
    #lb-close {
      position: absolute; top: 14px; right: 14px;
      background: rgba(255,255,255,0.1); border: none;
      color: #fff; font-size: 1.3rem;
      width: 42px; height: 42px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; z-index: 10;
    }
    #lb-close:hover { background: rgba(255,255,255,0.22); }
    .lb-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.1); border: none; color: #fff;
      font-size: 1.5rem; width: 44px; height: 44px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; z-index: 10;
    }
    .lb-nav:hover { background: rgba(255,255,255,0.22); }
    #lb-prev { left: 10px; }
    #lb-next { right: 10px; }

    #watermark {
      position: fixed; bottom: 16px; right: 16px;
      font-size: 0.68rem; color: rgba(255,255,255,0.15);
      pointer-events: none; z-index: 1001;
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>📸 갤러리</h1>
    <span class="badge" id="countBadge">불러오는 중…</span>
  </div>
  <div class="folder-bar">
    <div class="folder-select-wrap">
      <select id="folderSelect">
        <option value="root">📁 전체 (루트)</option>
      </select>
    </div>
    <div class="folder-chips" id="folderChips"></div>
  </div>
</header>

<div id="gallery" class="gallery"></div>
<div id="stateBox"></div>

<!-- 라이트박스 -->
<div id="lightbox">
  <button id="lb-close">✕</button>
  <button class="lb-nav" id="lb-prev">‹</button>
  <div class="lb-img-wrap" id="lbImgWrap">
    <img id="lb-thumb" src="" alt="">
    <img id="lb-hires" src="" alt="">
    <div id="lb-spinner"></div>
  </div>
  <video id="lb-video" controls controlsList="nodownload" disablePictureInPicture></video>
  <button class="lb-nav" id="lb-next">›</button>
  <div id="lb-caption"></div>
</div>

<div id="watermark">무단 복제 금지</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz0cBl-OPXkeoxSs80Bv2_zqAf-B98yrzZ6AuD966FNVjDx0WOy-DgzMip9pFBe84c/exec';

  // ── 복사 방지 ──
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('dragstart',   e => e.preventDefault());
  document.addEventListener('selectstart', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    const ctrl = e.ctrlKey || e.metaKey;
    if (ctrl && ['s','u','a','c','p'].includes(e.key.toLowerCase())) e.preventDefault();
    if (e.key === 'PrintScreen') e.preventDefault();
  });

  // ── URL 생성 ──
  // Google CDN 직접 접근 — drive.google.com/thumbnail보다 훨씬 빠름
  const cdn = id => `https://lh3.googleusercontent.com/d/${id}`;
  const thumbUrl = (id, w = 400) => `${cdn(id)}=w${w}`;
  const hiresUrl = (id)           => `${cdn(id)}=w1920`;

  // ── 상태 ──
  let files = [], folders = [], currentIdx = 0;

  // ── DOM ──
  const gallery      = document.getElementById('gallery');
  const stateBox     = document.getElementById('stateBox');
  const countBadge   = document.getElementById('countBadge');
  const folderSelect = document.getElementById('folderSelect');
  const folderChips  = document.getElementById('folderChips');
  const lightbox     = document.getElementById('lightbox');
  const lbImgWrap    = document.getElementById('lbImgWrap');
  const lbThumb      = document.getElementById('lb-thumb');
  const lbHires      = document.getElementById('lb-hires');
  const lbSpinner    = document.getElementById('lb-spinner');
  const lbVideo      = document.getElementById('lb-video');
  const lbCaption    = document.getElementById('lb-caption');

  // ── Intersection Observer (lazy load) ──
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const img = entry.target.querySelector('img');
      if (img && img.dataset.src) {
        img.src = img.dataset.src;
        delete img.dataset.src;
      }
      observer.unobserve(entry.target);
    });
  }, { rootMargin: '200px' }); // 200px 미리 로드

  // ── 초기화 ──
  async function init() {
    await loadFolders();
    await loadFiles('root');
  }

  // ── 폴더 목록 ──
  async function loadFolders() {
    try {
      const res  = await fetch(SCRIPT_URL + '?action=folders');
      const data = await res.json();
      if (data.status !== 'success' || !data.folders.length) return;
      folders = data.folders;
      folders.forEach(f => {
        const opt = document.createElement('option');
        opt.value = f.id;
        opt.textContent = '📂 ' + f.name;
        folderSelect.appendChild(opt);
      });
      renderChips('root');
    } catch (_) {}
  }

  function renderChips(activeId) {
    folderChips.innerHTML = '';
    [{ id: 'root', name: '📁 전체' }, ...folders.map(f => ({ id: f.id, name: '📂 ' + f.name }))]
      .forEach(({ id, name }) => {
        const btn = document.createElement('button');
        btn.className = 'chip' + (id === activeId ? ' active' : '');
        btn.textContent = name;
        btn.addEventListener('click', () => switchFolder(id));
        folderChips.appendChild(btn);
      });
  }

  // ── 파일 목록 ──
  async function loadFiles(folderId) {
    gallery.innerHTML = '';
    stateBox.innerHTML = '<div class="state-center"><div class="spinner"></div><span>불러오는 중…</span></div>';
    countBadge.textContent = '…';

    // 스켈레톤 먼저 렌더 (즉각적인 피드백)
    for (let i = 0; i < 6; i++) {
      const sk = document.createElement('div');
      sk.className = 'gallery-item skeleton';
      gallery.appendChild(sk);
    }
    stateBox.innerHTML = '';

    try {
      const url = folderId === 'root'
        ? SCRIPT_URL + '?action=list'
        : SCRIPT_URL + '?action=list&folderId=' + folderId;
      const res  = await fetch(url);
      const data = await res.json();
      if (data.status !== 'success') throw new Error(data.message);

      files = data.files;
      gallery.innerHTML = '';

      if (!files.length) {
        stateBox.innerHTML = '<div class="state-center"><span style="font-size:2rem">📭</span><span>이 폴더에 사진이 없습니다.</span></div>';
        countBadge.textContent = '0장';
        return;
      }

      countBadge.textContent = files.length + '장';
      files.forEach((f, i) => renderItem(f, i));

    } catch (err) {
      gallery.innerHTML = '';
      stateBox.innerHTML = `<div class="state-center"><span style="font-size:2rem">⚠️</span><span>불러오기 실패: ${err.message}</span></div>`;
      countBadge.textContent = '오류';
    }
  }

  function switchFolder(folderId) {
    folderSelect.value = folderId;
    renderChips(folderId);
    loadFiles(folderId);
  }
  folderSelect.addEventListener('change', () => switchFolder(folderSelect.value));

  // ── 아이템 렌더 ──
  function renderItem(f, i) {
    const isVideo = f.mimeType.startsWith('video/');
    const div = document.createElement('div');
    div.className = 'gallery-item';

    const img = document.createElement('img');
    img.alt = f.name;
    // 처음 6개는 즉시 로드, 나머지는 Intersection Observer
    if (i < 6) {
      img.src = thumbUrl(f.id, 400);
    } else {
      img.dataset.src = thumbUrl(f.id, 400);
    }
    img.onload  = () => { img.classList.add('loaded'); div.classList.remove('skeleton'); };
    img.onerror = () => div.classList.remove('skeleton');

    if (isVideo) {
      const badge = document.createElement('span');
      badge.className = 'video-badge';
      badge.textContent = '🎥 동영상';
      div.appendChild(badge);
    }
    div.appendChild(img);
    div.addEventListener('click', () => openLightbox(i));
    gallery.appendChild(div);

    if (i >= 6) observer.observe(div);
  }

  // ── 라이트박스 ──
  let hiresReq = null; // 진행 중인 hires 로드 추적

  function openLightbox(idx) {
    currentIdx = idx;
    showSlide();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    lbVideo.pause(); lbVideo.src = '';
    lbThumb.src = ''; lbHires.src = '';
    lbHires.classList.remove('ready');
    document.body.style.overflow = '';
    if (hiresReq) { hiresReq.src = ''; hiresReq = null; }
  }

  function showSlide() {
    const f = files[currentIdx];
    lbCaption.textContent = f.name;
    const isVideo = f.mimeType.startsWith('video/');

    // hires 로드 취소
    if (hiresReq) { hiresReq.src = ''; hiresReq = null; }
    lbHires.classList.remove('ready');

    if (isVideo) {
      lbImgWrap.style.display = 'none';
      lbVideo.style.display   = 'block';
      lbVideo.src = `https://drive.google.com/file/d/${f.id}/preview`;
    } else {
      lbVideo.style.display   = 'none';
      lbImgWrap.style.display = 'flex';

      // ① 즉시: 썸네일(w600) 표시 — 대부분 캐시 or 빠른 로드
      lbThumb.src = thumbUrl(f.id, 600);
      lbSpinner.style.display = 'block';

      // ② 배경: 고해상도 로드 후 교체
      const req = new Image();
      hiresReq = req;
      req.onload = () => {
        if (hiresReq !== req) return; // 슬라이드가 바뀐 경우 무시
        lbHires.src = req.src;
        lbHires.classList.add('ready');
        lbSpinner.style.display = 'none';
        hiresReq = null;
      };
      req.src = hiresUrl(f.id);
    }

    // ③ 다음/이전 이미지 미리 preload
    preload(currentIdx + 1);
    preload(currentIdx - 1);
  }

  function preload(idx) {
    if (idx < 0 || idx >= files.length) return;
    const f = files[idx];
    if (!f.mimeType.startsWith('video/')) {
      const img = new Image();
      img.src = thumbUrl(f.id, 600);
    }
  }

  // 네비게이션
  function goPrev() { currentIdx = (currentIdx - 1 + files.length) % files.length; showSlide(); }
  function goNext() { currentIdx = (currentIdx + 1) % files.length; showSlide(); }

  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', goPrev);
  document.getElementById('lb-next').addEventListener('click', goNext);
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'ArrowLeft')  goPrev();
    if (e.key === 'ArrowRight') goNext();
    if (e.key === 'Escape')     closeLightbox();
  });

  // 스와이프
  let touchX = 0;
  lightbox.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
  lightbox.addEventListener('touchend', e => {
    const diff = touchX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) diff > 0 ? goNext() : goPrev();
  });

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init();
</script>
</body>
</html>
