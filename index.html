<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#4f8ef7">
  <title>사진·동영상 공유</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #4f8ef7;
      --blue-dark: #2563eb;
      --red: #ef4444;
      --green: #16a34a;
      --bg: #f0f4ff;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Segoe UI', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 16px 40px;
    }

    .card {
      background: var(--card);
      border-radius: 24px;
      padding: 28px 20px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(79, 142, 247, 0.12);
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header .emoji { font-size: 2.8rem; display: block; margin-bottom: 10px; }
    .header h1 { font-size: 1.5rem; color: var(--text); font-weight: 700; margin-bottom: 6px; }
    .header p { font-size: 0.875rem; color: var(--muted); line-height: 1.5; }

    /* ── 드롭존 ── */
    .drop-zone {
      border: 2.5px dashed var(--blue);
      border-radius: 18px;
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      background: #f5f8ff;
      transition: background 0.2s, border-color 0.2s;
      margin-bottom: 16px;
      -webkit-tap-highlight-color: transparent;
    }
    .drop-zone.over { background: #dbeafe; border-color: var(--blue-dark); }
    .drop-zone .dz-icon { font-size: 2.4rem; margin-bottom: 10px; display: block; }
    .drop-zone .dz-label { font-size: 0.95rem; font-weight: 600; color: var(--blue); }
    .drop-zone .dz-sub { font-size: 0.78rem; color: var(--muted); margin-top: 5px; }

    /* ── 촬영 버튼 ── */
    .capture-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .btn-capture {
      padding: 14px 10px;
      border: none;
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: transform 0.15s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-capture:active { transform: scale(0.96); opacity: 0.85; }
    .btn-photo { background: var(--blue); color: #fff; }
    .btn-video { background: var(--red); color: #fff; }

    /* ── 파일 목록 ── */
    .file-list { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
    .file-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .file-item .fi-icon { font-size: 1.5rem; flex-shrink: 0; }
    .file-item .fi-info { flex: 1; min-width: 0; }
    .file-item .fi-name {
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-item .fi-meta { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .fi-status { font-size: 1rem; flex-shrink: 0; }
    .btn-remove {
      background: none;
      border: none;
      color: #cbd5e1;
      font-size: 1.1rem;
      cursor: pointer;
      flex-shrink: 0;
      padding: 4px;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-remove:hover { color: var(--red); }

    /* ── 진행 바 ── */
    .progress-wrap { margin-bottom: 18px; display: none; }
    .progress-track {
      background: #e2e8f0;
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--blue-dark));
      border-radius: 999px;
      width: 0%;
      transition: width 0.35s ease;
    }
    .progress-label { font-size: 0.78rem; color: var(--muted); text-align: right; }

    /* ── 업로드 버튼 ── */
    .btn-submit {
      width: 100%;
      padding: 17px;
      background: linear-gradient(135deg, var(--blue), var(--blue-dark));
      color: #fff;
      border: none;
      border-radius: 16px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-submit:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-submit:not(:disabled):active { transform: scale(0.98); }

    /* ── 상태 메시지 ── */
    .toast {
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.88rem;
      line-height: 1.5;
      text-align: center;
      display: none;
    }
    .toast.success { background: #dcfce7; color: #15803d; }
    .toast.error   { background: #fee2e2; color: #b91c1c; }
    .toast.info    { background: #dbeafe; color: #1d4ed8; }

    input[type="file"] { display: none; }

    @media (min-width: 480px) {
      body { padding-top: 40px; }
      .card { padding: 36px 32px; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <span class="emoji">📸</span>
    <h1>사진 · 동영상 공유</h1>
    <p>촬영한 사진이나 동영상을 선택하면<br>자동으로 업로드됩니다.</p>
  </div>

  <!-- 숨겨진 파일 input -->
  <input type="file" id="fileInput" multiple accept="image/*,video/*">
  <input type="file" id="photoCapture" accept="image/*" capture="environment">
  <input type="file" id="videoCapture" accept="video/*" capture="environment">

  <!-- 드롭존 (PC용 / 라이브러리 선택) -->
  <div class="drop-zone" id="dropZone">
    <span class="dz-icon">🗂️</span>
    <div class="dz-label">파일을 선택하거나 여기에 끌어다 놓으세요</div>
    <div class="dz-sub">사진 · 동영상 여러 개 가능 &nbsp;|&nbsp; 최대 30 MB / 파일</div>
  </div>

  <!-- 모바일 카메라 촬영 -->
  <div class="capture-row">
    <button class="btn-capture btn-photo" id="btnPhoto">📷 사진 촬영</button>
    <button class="btn-capture btn-video" id="btnVideo">🎥 동영상 촬영</button>
  </div>

  <!-- 선택된 파일 목록 -->
  <div class="file-list" id="fileList"></div>

  <!-- 진행 바 -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-label" id="progressLabel">0%</div>
  </div>

  <!-- 업로드 버튼 -->
  <button class="btn-submit" id="submitBtn" disabled>업로드하기</button>

  <!-- 결과 알림 -->
  <div class="toast" id="toast"></div>
</div>

<script>
  // ──────────────────────────────────────────────
  //  ⚙️  설정: Apps Script 배포 URL을 여기에 입력
  // ──────────────────────────────────────────────
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz0cBl-OPXkeoxSs80Bv2_zqAf-B98yrzZ6AuD966FNVjDx0WOy-DgzMip9pFBe84c/exec';
  const MAX_MB = 30;
  const MAX_BYTES = MAX_MB * 1024 * 1024;

  // ── 상태 ──
  let queue = []; // { file, status: 'pending'|'uploading'|'done'|'error' }

  // ── DOM ──
  const dropZone    = document.getElementById('dropZone');
  const fileInput   = document.getElementById('fileInput');
  const photoInput  = document.getElementById('photoCapture');
  const videoInput  = document.getElementById('videoCapture');
  const fileListEl  = document.getElementById('fileList');
  const submitBtn   = document.getElementById('submitBtn');
  const progressWrap= document.getElementById('progressWrap');
  const progressFill= document.getElementById('progressFill');
  const progressLbl = document.getElementById('progressLabel');
  const toast       = document.getElementById('toast');

  // ── 이벤트 연결 ──
  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => addFiles(e.target.files));
  photoInput.addEventListener('change', e => addFiles(e.target.files));
  videoInput.addEventListener('change', e => addFiles(e.target.files));

  document.getElementById('btnPhoto').addEventListener('click', () => photoInput.click());
  document.getElementById('btnVideo').addEventListener('click', () => videoInput.click());

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('over');
    addFiles(e.dataTransfer.files);
  });

  submitBtn.addEventListener('click', uploadAll);

  // ── 파일 추가 ──
  function addFiles(fileList) {
    let skipped = 0;
    for (const f of fileList) {
      if (f.size > MAX_BYTES) { skipped++; continue; }
      if (queue.find(q => q.file.name === f.name && q.file.size === f.size)) continue;
      queue.push({ file: f, status: 'pending' });
    }
    if (skipped) showToast(`⚠️ ${skipped}개 파일이 ${MAX_MB}MB 초과로 제외되었습니다.`, 'error');
    render();
  }

  // ── 렌더 ──
  function render() {
    fileListEl.innerHTML = '';
    queue.forEach((item, i) => {
      const isVideo = item.file.type.startsWith('video/');
      const statusIcon = { pending:'⏳', uploading:'🔄', done:'✅', error:'❌' }[item.status];
      const div = document.createElement('div');
      div.className = 'file-item';
      div.innerHTML = `
        <span class="fi-icon">${isVideo ? '🎥' : '📷'}</span>
        <div class="fi-info">
          <div class="fi-name">${esc(item.file.name)}</div>
          <div class="fi-meta">${fmtSize(item.file.size)} · ${statusText(item.status)}</div>
        </div>
        <span class="fi-status">${statusIcon}</span>
        ${item.status === 'pending' ? `<button class="btn-remove" data-i="${i}" title="제거">✕</button>` : ''}
      `;
      fileListEl.appendChild(div);
    });

    fileListEl.querySelectorAll('.btn-remove').forEach(btn => {
      btn.addEventListener('click', () => {
        queue.splice(+btn.dataset.i, 1);
        render();
      });
    });

    const pending = queue.filter(q => q.status === 'pending').length;
    submitBtn.disabled = pending === 0;
  }

  function statusText(s) {
    return { pending:'대기 중', uploading:'업로드 중…', done:'완료', error:'오류' }[s];
  }

  // ── 업로드 ──
  async function uploadAll() {
    if (SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
      showToast('❌ Apps Script URL이 설정되지 않았습니다. index.html 상단의 SCRIPT_URL을 수정해주세요.', 'error');
      return;
    }

    const targets = queue.filter(q => q.status === 'pending');
    if (!targets.length) return;

    submitBtn.disabled = true;
    progressWrap.style.display = 'block';
    hideToast();

    let done = 0, errors = 0;

    for (const item of targets) {
      item.status = 'uploading';
      render();

      try {
        const b64 = await toBase64(item.file);
        await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({
            fileName: item.file.name,
            mimeType: item.file.type || 'application/octet-stream',
            fileData: b64
          })
        });
        item.status = 'done';
        done++;
      } catch {
        item.status = 'error';
        errors++;
      }

      const progress = Math.round(((done + errors) / targets.length) * 100);
      progressFill.style.width = progress + '%';
      progressLbl.textContent = progress + '%';
      render();
    }

    progressWrap.style.display = 'none';
    progressFill.style.width = '0%';

    if (errors === 0) {
      showToast(`✅ ${done}개 파일 업로드 완료!`, 'success');
    } else if (done > 0) {
      showToast(`⚠️ ${done}개 성공 / ${errors}개 실패`, 'error');
    } else {
      showToast('❌ 업로드에 실패했습니다. 네트워크를 확인하고 다시 시도해주세요.', 'error');
    }

    submitBtn.disabled = queue.filter(q => q.status === 'pending').length === 0;
  }

  // ── 유틸 ──
  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function fmtSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1048576).toFixed(1) + ' MB';
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showToast(msg, type) {
    toast.textContent = msg;
    toast.className = 'toast ' + type;
    toast.style.display = 'block';
  }
  function hideToast() { toast.style.display = 'none'; }
</script>
</body>
</html>
